name: Android Camera Harness

on:
  pull_request:
    paths:
      - ".github/workflows/android-camera-harness.yml"
      - "android/**"
      - "example/**"
      - "lib/**"
      - "tool/ffprobe_recording_outputs.dart"
      - "pubspec.yaml"

jobs:
  android-camera-harness:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: "3.44.3"
          channel: stable
          cache: true

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Resolve root dependencies
        run: flutter pub get

      - name: Resolve example dependencies
        run: flutter pub get
        working-directory: example

      - name: Run camera smoke harness and ffprobe outputs
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-boot-timeout: 1200
          disable-animations: true
          script: |
            ( for _ in $(seq 1 60); do adb shell pm grant com.example.pretty_awesome_camera_example android.permission.CAMERA && adb shell pm grant com.example.pretty_awesome_camera_example android.permission.RECORD_AUDIO && break || true; sleep 1; done ) &
            cd example && flutter test integration_test/recording_permutation_harness_test.dart -d emulator-5554 --dart-define=CAMERA_HARNESS_SCENARIOS=record_stop,rapid_start_stop
            mkdir -p build/camera-harness-output
            adb exec-out run-as com.example.pretty_awesome_camera_example sh -c 'cd cache && tar cf - *.mp4 *.pretty_camera_harness.json' | tar xf - -C build/camera-harness-output
            dart run tool/ffprobe_recording_outputs.dart build/camera-harness-output

      - name: Upload camera harness outputs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-camera-harness-output
          path: build/camera-harness-output
          if-no-files-found: warn
